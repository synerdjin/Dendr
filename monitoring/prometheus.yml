# Prometheus scrape configuration for Dendr.
#
# Two modes:
#   Native:  Dendr runs on the host, Prometheus in Docker.
#            Targets use host.docker.internal to reach the host.
#   Docker:  Dendr runs in Docker Compose alongside Prometheus.
#            Targets use Docker service names.
#
# Toggle by commenting/uncommenting the target blocks below.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # --- Native mode (Dendr on host, Prometheus in Docker) ---
  # - job_name: "dendr-daemon"
  #   static_configs:
  #     - targets: ["host.docker.internal:9100"]
  #
  # - job_name: "dendr-search"
  #   metrics_path: /metrics
  #   static_configs:
  #     - targets: ["host.docker.internal:7777"]

  # --- Docker mode (Dendr runs in Docker Compose alongside Prometheus) ---
  - job_name: "dendr-daemon"
    static_configs:
      - targets: ["daemon:9100"]

  - job_name: "dendr-search"
    metrics_path: /metrics
    static_configs:
      - targets: ["search:7777"]

  # --- GPU metrics (nvidia-smi based, works on Windows Docker Desktop) ---
  - job_name: "gpu"
    static_configs:
      - targets: ["gpu-exporter:9835"]
