# Dendr Docker Compose — daemon + search server with GPU access.
#
# Usage:
#   1. Copy .env.example to .env and fill in paths
#   2. docker compose run daemon dendr models pull   # first-time model download
#   3. docker compose up -d                          # start services
#
# Requires: nvidia-container-toolkit (for GPU passthrough)

services:
  daemon:
    build: .
    volumes:
      - ${VAULT_PATH:?Set VAULT_PATH in .env}:/vault
      - ${DENDR_DATA:-dendr-data}:/data
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: ["daemon", "--data-dir", "/data"]
    restart: unless-stopped

  search:
    build: .
    ports:
      - "${SEARCH_PORT:-7777}:7777"
    volumes:
      - ${VAULT_PATH:?Set VAULT_PATH in .env}:/vault:ro
      - ${DENDR_DATA:-dendr-data}:/data
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: ["serve", "--data-dir", "/data"]
    restart: unless-stopped

  # --- Monitoring stack ---

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  grafana:
    image: grafana/grafana-oss:latest
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-dendr}
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

  gpu-exporter:
    image: utkuozdemir/nvidia_gpu_exporter:1.3.0
    command:
      - --nvidia-smi-command
      - nvidia-smi
      - --query-field-names
      - uuid,name,memory.total,memory.used,memory.free,utilization.gpu,utilization.memory,temperature.gpu,power.draw,pstate,clocks.current.sm,clocks.current.memory
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      - "9835:9835"
    restart: unless-stopped

volumes:
  dendr-data:
  prometheus-data:
  grafana-data:
